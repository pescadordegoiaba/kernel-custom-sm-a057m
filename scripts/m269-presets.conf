# Presets m269-perfd v3 — CPU/GPU/display/camera independentes (SM-A057M / sm6225)
# cpu_hotplug_level: 0=off (exp.), 1=conservador, 2=moderado, 3=agressivo
# cpu max_freq_pct: 50-100; aplicado em policy*/scaling_max_freq quando disponível
# governor_call_interval_us: 5000-50000 µs
# idle_timer_ms: ms antes de slumber GPU (maior = mais tempo ativa)
# gpu mod_percent: viés do governor Adreno TZ; 100=stock, >100 sobe clock mais cedo
# display refresh_hz: 0=restaurar stock, 60/90=forçar settings min/peak
# display render_scale_pct: 50-100; aplica wm size lógico, sem alterar timing físico
# camera perf_mode: 0=stock, 1=latência, 2=economia

