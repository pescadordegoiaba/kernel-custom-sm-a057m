# Perfis do m269-perfd — valores iniciais; calibrar no aparelho.
# governor_call_interval_us: microssegundos (µs), faixa segura 5000-50000
# idle_timer_ms: milissegundos antes de slumber (valores maiores = GPU ativa por mais tempo)
# cpu_hotplug_level: 0=off (experimental), 1=conservador, 2=moderado, 3=agressivo

PROFILE_balanced_name=Balanceado
PROFILE_balanced_governor_us=10000
PROFILE_balanced_idle_timer_ms=80
PROFILE_balanced_cpu_hotplug=1
PROFILE_balanced_max_gpuclk_pct=100

PROFILE_performance_name="Desempenho"
PROFILE_performance_governor_us=8000
PROFILE_performance_idle_timer_ms=100
PROFILE_performance_cpu_hotplug=1
PROFILE_performance_max_gpuclk_pct=100

PROFILE_game_name="Jogos"
PROFILE_game_governor_us=10000
PROFILE_game_idle_timer_ms=110
PROFILE_game_cpu_hotplug=1
PROFILE_game_max_gpuclk_pct=100

PROFILE_camera_name="Câmera"
PROFILE_camera_governor_us=10000
PROFILE_camera_idle_timer_ms=90
PROFILE_camera_cpu_hotplug=1
PROFILE_camera_max_gpuclk_pct=100

PROFILE_powersave_name="Economia"
PROFILE_powersave_governor_us=18000
PROFILE_powersave_idle_timer_ms=50
PROFILE_powersave_cpu_hotplug=2
PROFILE_powersave_max_gpuclk_pct=90
